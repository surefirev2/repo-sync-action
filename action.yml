name: Template Sync
description: Sync files from a template repository to downstream repos via pull requests.
branding:
  icon: git-merge
  color: blue

inputs:
  config_path:
    description: Path to template-sync config YAML (relative to workspace)
    required: false
    default: .github/template-sync.yml
  org:
    description: GitHub org for resolving repo list (defaults to repository owner when empty)
    required: false
    default: ""
  token:
    description: GitHub token (e.g. from create-github-app-token). Required for non-dry-run; use empty or placeholder for dry-run.
    required: false
    default: ""
  dry_run:
    description: If true, only log what would be synced; no clone/push/PR
    required: false
    default: "false"
  draft_pr:
    description: If true, create or update PRs as draft
    required: false
    default: "false"

outputs:
  repos_list:
    description: Space-separated list of target repo names
    value: ${{ steps.config.outputs.repos_list }}
  count:
    description: Number of files to sync
    value: ${{ steps.files.outputs.count }}

runs:
  using: composite
  steps:
    - name: Resolve dependent repos and exclusions
      id: config
      env:
        DEBUG: "1"
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: |
        ORG="${{ inputs.org }}"
        if [[ -z "$ORG" ]]; then ORG="$GITHUB_REPOSITORY_OWNER"; fi
        bash "${{ github.action_path }}/src/template-sync-resolve-config.sh" \
          --config "${{ inputs.config_path }}" \
          --org "$ORG" \
          --out-dir "${{ github.workspace }}"
      shell: bash

    - name: Build list of files to sync
      id: files
      env:
        DEBUG: "1"
        REPOS: ${{ steps.config.outputs.repos_list }}
      run: bash "${{ github.action_path }}/src/template-sync-ga-build-file-list.sh"
      shell: bash

    - name: Get merged PR number (push to main)
      id: merged-pr
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        pr=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].number' 2>/dev/null || true)
        if [[ -z "$pr" || "$pr" == "null" ]]; then
          pr=$(git log -1 --pretty=%B "${{ github.sha }}" 2>/dev/null | sed -n 's/^Merge pull request #\([0-9]*\) from .*/\1/p' || true)
        fi
        if [[ -z "$pr" || "$pr" == "null" ]]; then
          pr=$(git log -1 --pretty=%B "${{ github.sha }}" 2>/dev/null | sed -n 's/.*(#\([0-9]*\)).*/\1/p' | head -1)
        fi
        if [[ -n "$pr" ]]; then
          echo "number=$pr" >> "$GITHUB_OUTPUT"
          echo "Merged PR number: $pr (will reuse draft PR branch)"
        else
          echo "number=" >> "$GITHUB_OUTPUT"
          echo "Not a merge of a PR; sync will use branch without PR suffix"
        fi
      shell: bash

    - name: Preview sync impact
      if: github.event_name == 'pull_request'
      env:
        DEBUG: "1"
        REPOS: ${{ steps.config.outputs.repos_list }}
        COUNT: ${{ steps.files.outputs.count }}
      run: bash "${{ github.action_path }}/src/template-sync-write-step-summary.sh"
      shell: bash

    - name: Generate diff of synced files per repo (PR base → head)
      if: github.event_name == 'pull_request' && steps.files.outputs.count != '0' && steps.config.outputs.repos_list != ''
      env:
        DEBUG: "1"
        REPOS: ${{ steps.config.outputs.repos_list }}
      run: bash "${{ github.action_path }}/src/template-sync-generate-diffs.sh"
      shell: bash

    - name: Sync to dependents and open draft PR
      if: github.event_name == 'pull_request' && steps.config.outputs.repos_list != '' && steps.files.outputs.count != '0'
      env:
        DEBUG: "1"
        GH_TOKEN: ${{ inputs.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        ORG: ${{ github.repository_owner }}
        BRANCH: chore/template-sync-${{ github.repository_owner }}-${{ github.event.repository.name }}
        PARENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        PARENT_PR_URL: https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}
        REPOS_LIST: ${{ steps.config.outputs.repos_list }}
        FILES_LIST_TEMPLATE: files_to_sync_%s.txt
        DRAFT_PR: "1"
        CHILD_PR_URLS_FILE: child_pr_urls.txt
      run: bash "${{ github.action_path }}/src/template-sync-push-pr.sh" --draft
      shell: bash

    - name: Upsert template sync preview comment on PR
      if: github.event_name == 'pull_request'
      env:
        DEBUG: "1"
        GH_TOKEN: ${{ github.token }}
        REPOS: ${{ steps.config.outputs.repos_list }}
        COUNT: ${{ steps.files.outputs.count }}
        FILES_LIST: files_to_sync.txt
        FILES_LIST_TEMPLATE: files_to_sync_%s.txt
        DIFF_FILE_TEMPLATE: sync_diff_%s.txt
        CHILD_PR_URLS_FILE: child_pr_urls.txt
      run: bash "${{ github.action_path }}/src/template-sync-pr-comment.sh" "${{ github.event.pull_request.number }}"
      shell: bash

    - name: Sync to dependents and open PR
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.config.outputs.repos_list != '' && steps.files.outputs.count != '0'
      env:
        DEBUG: "1"
        GH_TOKEN: ${{ inputs.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        ORG: ${{ github.repository_owner }}
        BRANCH: chore/template-sync-${{ github.repository_owner }}-${{ github.event.repository.name }}
        PARENT_PR_NUMBER: ${{ github.event_name == 'push' && steps.merged-pr.outputs.number || '' }}
        REPOS_LIST: ${{ steps.config.outputs.repos_list }}
        FILES_LIST_TEMPLATE: files_to_sync_%s.txt
        DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '' }}
        DRAFT_PR: ${{ github.event_name == 'workflow_dispatch' && inputs.draft_pr && '1' || '' }}
      run: bash "${{ github.action_path }}/src/template-sync-push-pr.sh"
      shell: bash
