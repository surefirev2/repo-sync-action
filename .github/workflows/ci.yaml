---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck src/*.sh test/run-*.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: make test

  integration:
    name: Integration (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run template sync (dry-run)
        uses: .
        with:
          config_path: .github/template-sync.yml
          org: ${{ github.repository_owner }}
          token: ""
          dry_run: true
          draft_pr: false
